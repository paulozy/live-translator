name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install faster-whisper sounddevice numpy SpeechRecognition
          pip install transformers sentencepiece
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller `
            --noconfirm `
            --onedir `
            --windowed `
            --name "LiveTranslator" `
            --icon "app/assets/icon.ico" `
            --hidden-import="faster_whisper" `
            --hidden-import="ctranslate2" `
            --hidden-import="sounddevice" `
            --hidden-import="speech_recognition" `
            --hidden-import="transformers" `
            --hidden-import="sentencepiece" `
            --collect-all faster_whisper `
            --collect-all ctranslate2 `
            --collect-all tokenizers `
            --collect-all huggingface_hub `
            --collect-all transformers `
            --collect-all sentencepiece `
            translator.py

      - name: Create ZIP
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          Compress-Archive -Path "dist\LiveTranslator" -DestinationPath "LiveTranslator-$tag-windows.zip"
          Write-Host "ZIP criado: LiveTranslator-$tag-windows.zip"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Live Translator ${{ github.ref_name }}"
          draft: false
          prerelease: true
          generate_release_notes: true
          body: |
            ## Download

            1. Baixe o arquivo **LiveTranslator-${{ github.ref_name }}-windows.zip**
            2. Extraia em qualquer pasta
            3. Execute `LiveTranslator.exe`

            > **Primeira execução:** o modelo Whisper será baixado automaticamente.
            > `small` ≈ 500 MB · `medium` ≈ 1.5 GB
            >
            > Requer Windows 10 64-bit ou superior.
          files: "LiveTranslator-*.zip"
